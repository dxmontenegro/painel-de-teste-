<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Sistemas</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fa;
  text-align: center;
  padding: 30px;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 12px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

button {
  padding: 12px;
  background: #059669;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.status {
  margin-top: 20px;
  text-align: left;
  font-size: 16px;
}

.ok { color: green; }
.err { color: red; }
.loading { opacity: 0.6; }
</style>
</head>

<body>

<div class="container">
  <h2>🚀 Painel de Sistemas</h2>

  <button onclick="verificar()">🔄 Verificar Sistemas</button>

  <div id="status" class="status"></div>
</div>

<script>

const sistemas = [
  { nome: "Conselho", url: "https://conselho2026.vercel.app/api/ping" },
  { nome: "Banco GOV", url: "https://banco-gov.vercel.app/api/ping" },
  { nome: "Ocorrências", url: "https://ocorrencias-tau.vercel.app/api/ping" },
  { nome: "EletiFAS", url: "https://eletifas.vercel.app/api/ping" },
  { nome: "Atividades", url: "https://helpatividadesddmar.vercel.app/api/ping" },
  { nome: "Reservas", url: "https://reservaprojetores.vercel.app/api/ping" }
];

async function verificar() {

  const status = document.getElementById("status");
  status.innerHTML = "";

  for (let s of sistemas) {

    const linha = document.createElement("div");
    linha.innerHTML = `⏳ ${s.nome}`;
    linha.className = "loading";
    status.appendChild(linha);

    try {

      const res = await fetch(s.url);

      if (res.ok) {
        linha.innerHTML = `✅ ${s.nome}`;
        linha.className = "ok";
      } else {
        linha.innerHTML = `⚠️ ${s.nome}`;
      }

    } catch (e) {
      linha.innerHTML = `❌ ${s.nome}`;
      linha.className = "err";
    }
  }
}

</script>

</body>
</html>
