<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Sistemas</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: #111827;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

h2 { text-align: center; }

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #059669, #10b981);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-bottom: 15px;
}

.item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  background: #1f2937;
}

.ok { color: #10b981; }
.err { color: #ef4444; }
.loading { color: #9ca3af; }

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 8px;
}

.green { background: #10b981; }
.red { background: #ef4444; }
.gray { background: #6b7280; }

.row {
  display: flex;
  align-items: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>🚀 Painel de Sistemas</h2>
  <button onclick="verificar()">🔄 Atualizar</button>
  <div id="lista"></div>
</div>

<script>

const sistemas = [
  { nome: "Conselho", url: "https://conselho2026.vercel.app/api/ping" },
  { nome: "Banco GOV", url: "https://eemtidragaodomarcofre.vercel.app/api/ping" },
  { nome: "Ocorrências", url: "https://ocorrencias-tau.vercel.app/api/ping" },
  { nome: "EletiFAS", url: "https://eletifas.vercel.app/api/ping" },
  { nome: "Atividades", url: "https://helpatividadesddmar.vercel.app/api/ping" },
  { nome: "Multimeios", url: "https://multimeios-six.vercel.app/api/ping" },
  { nome: "Reservas", url: "https://reservaprojetores.vercel.app/api/ping" }
];

async function verificar() {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const promessas = sistemas.map(async (s) => {

    const div = document.createElement("div");
    div.className = "item loading";
    div.innerHTML = `
      <div class="row">
        <div class="dot gray"></div>
        <span>${s.nome}</span>
      </div>
      <span>⏳</span>
    `;
    lista.appendChild(div);

    const inicio = Date.now();

    try {

      await fetch(s.url, { mode: "no-cors" });

      const tempo = Date.now() - inicio;

      div.className = "item ok";
      div.innerHTML = `
        <div class="row">
          <div class="dot green"></div>
          <span>${s.nome}</span>
        </div>
        <span>ONLINE • ${tempo}ms</span>
      `;

    } catch {

      div.className = "item err";
      div.innerHTML = `
        <div class="row">
          <div class="dot red"></div>
          <span>${s.nome}</span>
        </div>
        <span>OFFLINE</span>
      `;

    }

  });

  await Promise.all(promessas);
}

window.onload = verificar;
setInterval(verificar, 10 * 60 * 1000);

</script>

</body>
</html>
